        function renderBoard() {
            const container = document.getElementById('forge-list');
            
            const sorted = [...SPACES_DATA].sort((a, b) => b.price - a.price);

            container.innerHTML = '';

            sorted.forEach((item, index) => {
                const rank = index + 1;
                const isTop3 = rank <= 3 && item.price > 0;
                
                const card = document.createElement('div');
                card.className = `list-item flex items-center p-4 rounded-2xl border transition-all ${
                    isTop3 
                    ? 'bg-white border-blue-500 shadow-lg scale-[1.02] z-10' 
                    : 'bg-white border-gray-200 shadow-sm'
                }`;

                card.innerHTML = `
                    <div class="w-12 flex-shrink-0 font-black text-2xl ${isTop3 ? 'text-blue-600' : 'text-gray-300'}">
                        ${rank}
                    </div>
                    <div class="flex-grow">
                        <div class="font-bold text-lg">${item.name}</div>
                    </div>
                    <div class="text-right font-mono font-bold text-xl text-slate-700">
                        £${item.price}
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        window.onload = renderBoard;
